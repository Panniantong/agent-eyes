interface:
  display_name: "Agent Reach"
  short_description: "Windows research collection and diagnostics across web, search, developer, social, forum, registry, video, RSS, and optional browser-backed channels"
  default_prompt: "Use Agent Reach to discover the live channel contract, check readiness, and run thin read-only collection across Exa, Jina Reader, GitHub CLI, Hatena Bookmark, Bluesky, Qiita, yt-dlp, RSS feeds, SearXNG, Crawl4AI, Hacker News, MCP Registry, Reddit through rdt-cli, and optional Twitter/X tooling. Let the calling workflow choose channels from the contract for the user's task; keep ranking, summarization, scheduling, and publishing outside Agent Reach."
