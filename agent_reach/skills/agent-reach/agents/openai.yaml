interface:
  display_name: "Agent Reach"
  short_description: "Windows research collection and diagnostics across web, search, developer, social, forum, registry, video, RSS, and optional browser-backed channels"
  default_prompt: "Use Agent Reach to discover the live channel contract, inspect caller-defined readiness requirements, check probe attention, validate evidence ledgers, and run thin read-only collection across `web`, `exa_search`, `github`, `hatena_bookmark`, `bluesky`, `qiita`, `youtube`, `rss`, `searxng`, `crawl4ai`, `hacker_news`, `mcp_registry`, `reddit`, and `twitter` when configured. Always refer to channels by their stable names from `agent-reach channels --json`; do not invent shorthand names such as `hatena`. Agent Reach does not choose scope; the calling workflow chooses channels and scale for the task. Keep lightweight asks on collect by default, treat batch and scout as explicit opt-in helpers, and keep ranking, summarization, scheduling, media analysis, and publishing outside Agent Reach."
